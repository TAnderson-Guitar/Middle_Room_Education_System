<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Middle Room System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<link rel="shortcut icon" href="https://edu.sites.moodlecentral.com.au/ap/schools/nsw/quakershil-h/pluginfile.php/1/theme_moove/favicon/1772497795/QHHS%20Logo.ico">
</head>
{% include "header.html" %}
<body>

<div class="banner">
    <h1>Middle Room Booking</h1>
</div>

<div class="container mt-4">

    <div class="alert alert-success">
        Training completed ✓ | Test passed ✓
    </div>

    <div class="row">
        <div class="col-md-8">
            <h3>Select a Day & Time</h3>

            <table class="table table-bordered text-center align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Day</th>
                        <th>Recess</th>
                        <th>Lunch</th>
                    </tr>
                </thead>
                <tbody>
                    {% for day in days %}
                    <tr>
                        <td>{{ day }}</td>
                        {% for slot in slots %}
                        <td>
                            <button 
                                class="btn btn-primary btn-sm"
                                onclick="book('{{ day }}', '{{ slot }}')"
                                id="{{ day|lower }}_{{ slot|lower }}"
                            >
                                Book {{ slot }}
                            </button>
                        </td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="col-md-4">
            <h3>Middle Room Reservations</h3>
            <ul id="myBookings" class="list-group">
                <li class="list-group-item">Loading...</li>
            </ul>
        </div>
    </div>
</div>

<script>
async function book(day, slot) {
    const res = await fetch("/api/book", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ day, slot })
    });

    const data = await res.json();
    alert(data.message);
    loadBookings();
}

async function cancelBooking(id) {
    const res = await fetch("/api/cancel_booking", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id })
    });

    const data = await res.json();
    if (!data.success) {
        alert(data.message);
    }

    loadBookings();
}
async function loadBookings() {

    const allRes = await fetch("/api/all_bookings");
    const allBookings = await allRes.json();

    const myRes = await fetch("/api/my_bookings");
    const myBookings = await myRes.json();

    const list = document.getElementById("myBookings");
    list.innerHTML = "";

    document.querySelectorAll("button[id]").forEach(btn => {
        const original = btn.getAttribute("data-original");
        btn.innerText = original;
        btn.disabled = false;
        btn.className = "btn btn-primary btn-sm";

        const [day, slot] = original.replace("Book ", "").split(" ");
        btn.onclick = () => book(btn.dataset.day, btn.dataset.slot);
    });

    if (myBookings.length === 0) {
        list.innerHTML = "<li class='list-group-item'>No reservations yet.</li>";
    }

    myBookings.forEach(b => {
        list.innerHTML += `
            <li class="list-group-item d-flex justify-content-between align-items-center">
                ${b.day} — ${b.slot}
                <button class="btn btn-danger btn-sm" onclick="cancelBooking(${b.id})">Cancel</button>
            </li>
        `;
    });

    allBookings.forEach(b => {
        const id = `${b.day.toLowerCase()}_${b.slot.toLowerCase()}`;
        const btn = document.getElementById(id);

        if (!btn) return;

        const username = b.username;

        if (myBookings.some(m => m.id === b.id)) {
            btn.disabled = false;
            btn.innerText = "Cancel";
            btn.className = "btn btn-danger btn-sm";
            btn.onclick = () => cancelBooking(b.id);
        }

        else {
            btn.disabled = true;
            btn.innerText = `Booked by ${username}`;
            btn.className = "btn btn-secondary btn-sm";
        }
    });
}

document.querySelectorAll("button[id]").forEach(btn => {
    btn.setAttribute("data-original", btn.innerText);
    const parts = btn.id.split("_");
    btn.dataset.day = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
    btn.dataset.slot = parts[1].charAt(0).toUpperCase() + parts[1].slice(1);
});

loadBookings();
</script>



</body>
</html>
