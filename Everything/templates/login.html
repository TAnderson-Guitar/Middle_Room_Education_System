<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Middle Room System Log In</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<link rel="shortcut icon" href="https://edu.sites.moodlecentral.com.au/ap/schools/nsw/quakershil-h/pluginfile.php/1/theme_moove/favicon/1772497795/QHHS%20Logo.ico">
</head>
{% include "header.html" %}
<body>
    <div class="banner">
        <h1>Login to the Middle Room</h1>
    </div>

<div class="container mt-5" style="max-width: 500px;">

    <div class="card shadow-sm p-4">
        <h2 class="fw-bold mb-4 text-center">Login</h2>

        {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input 
                    type="email" 
                    name="email" 
                    class="form-control" 
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button class="btn btn-primary w-100 py-2">Login</button>
        </form>

        <div class="text-center my-3">
            <span>or</span>
        </div>

        <a href="/login/google" class="btn btn-danger w-100">
            Continue with Google
        </a>

        <hr class="my-4">

        <div class="text-center">
            <p class="mb-2">Don't have an account?</p>
            <a href="{{ url_for('register') }}" class="btn btn-outline-primary w-100">Create an Account</a>
        </div>
    </div>

</div>
</html>
