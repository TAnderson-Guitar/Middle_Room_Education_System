{% include "header.html" %}
<body>
    <div class="banner">
  <h1>Register to the Middle Room</h1>
</div>

<div class="container mt-5" style="max-width: 500px;">

    <div class="card shadow-sm p-4">
        <h2 class="fw-bold mb-4 text-center">Create an Account</h2>

        <form action="/register" method="POST">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input 
                    type="email" 
                    name="email" 
                    class="form-control" 
                    placeholder="Enter your school email"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Create a password"
                    required
                >
            </div>

            <button class="btn btn-primary w-100 py-2">Register</button>
        </form>

        <hr class="my-4">

        <div class="text-center">
            <p class="mb-2">Already have an account?</p>
            <a href="{{ url_for('login') }}" class="btn btn-outline-primary w-100">Back to Login</a>
        </div>
    </div>

</div>
