<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Middle Room Test</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<link rel="shortcut icon" href="https://edu.sites.moodlecentral.com.au/ap/schools/nsw/quakershil-h/pluginfile.php/1/theme_moove/favicon/1772497795/QHHS%20Logo.ico">
</head>
{% include "header.html" %}
<body>
    <div class="banner">
  <h1>Middle Room Test</h1>
</div>
<div class="container mt-5">
    <div class="text-center mb-4">
        <p class="lead">
            Answer All Questions correctly to gain access to the Middle Room. Good Luck!
        </p>
    </div>

<div class="mb-4">
    <div class="d-flex justify-content-between">
        <span id="progressText">Question 1 of {{ questions|length }}</span>
        <span id="answeredCount">0 / {{ questions|length }} answered</span>
    </div>
    <div class="progress">
        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
    </div>
</div>


    <form method="POST" id="testForm">

        {% for q in questions %}
        <div class="card mb-4 question-card" id="question-{{ loop.index0 }}" style="display: none;">
            <div class="card-body">
                <h5 class="card-title fw-bold">{{ q.text }}</h5>

                {% for option in q.options %}
                <div class="form-check">
                    <input class="form-check-input" type="radio" 
                           name="{{ q.id }}" 
                           value="{{ loop.index0 }}">
                    <label class="form-check-label">
                        {{ option }}
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}

<div class="d-flex justify-content-between mt-3">
    <button type="button" id="prevBtn" class="btn btn-secondary" onclick="prevQuestion()">Previous</button>
    <button type="button" id="nextBtn" class="btn btn-primary" onclick="nextQuestion()">Next</button>
    <button type="submit" id="submitBtn" class="btn btn-success" style="display: none;">Submit Test</button>
</div>

    </form>
</div>

<script>
let current = 0;
const total = {{ questions|length }};
const cards = document.querySelectorAll(".question-card");

function showQuestion(index) {
    cards.forEach((c, i) => {
        c.style.display = i === index ? "block" : "none";
    });

    const prevBtn = document.getElementById("prevBtn");
    if (index === 0) {
        prevBtn.disabled = true;
        prevBtn.classList.remove("btn-primary");
        prevBtn.classList.add("btn-secondary");
    } else {
        prevBtn.disabled = false;
        prevBtn.classList.remove("btn-secondary");
        prevBtn.classList.add("btn-primary");
    }

    const nextBtn = document.getElementById("nextBtn");
    if (index === total - 1) {
        nextBtn.disabled = true;
        nextBtn.classList.remove("btn-primary");
        nextBtn.classList.add("btn-secondary");
        document.getElementById("submitBtn").style.display = "inline-block";
    } else {
        nextBtn.disabled = false;
        nextBtn.classList.remove("btn-secondary");
        nextBtn.classList.add("btn-primary");
        document.getElementById("submitBtn").style.display = "none";
    }

    document.getElementById("progressText").innerText =
        `Question ${index + 1} of ${total}`;

    updateProgress();
}

function nextQuestion() {
    if (current < total - 1) {
        current++;
        showQuestion(current);
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        showQuestion(current);
    }
}

function updateProgress() {
    let answered = 0;
    document.querySelectorAll("input[type=radio]").forEach(r => {
        if (r.checked) answered++;
    });

    const percent = (answered / total) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("answeredCount").innerText =
        `${answered} / ${total} answered`;
}

document.querySelectorAll("input[type=radio]").forEach(r => {
    r.addEventListener("change", updateProgress);
});

showQuestion(0);
</script>



</body>
</html>
